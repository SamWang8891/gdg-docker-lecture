# 注意：現代 Docker Compose 推薦檔名是 compose.yml（沒有 docker- 前綴）
# 舊名 docker-compose.yaml / docker-compose.yml 也還能用，向下相容

services:
  backend:
    build: ./backend
    # 注意：沒有 ports！後端完全藏在 internal network 裡
    # 外面世界無法直接打 backend，只能透過 frontend 的 nginx proxy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"   # 只有它對 host 開 port
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

networks:
  internal:
    driver: bridge   # custom bridge：同 network 的 container 可以用 service name 互找
